replicaCount: 1
version: 1
name: ecommerce-back
environment: development

deployment:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  image:
    url: ncostamagna/ecommerce-back
    version: "eb9e29932dad7b9d756d6724e69a076a8dc3e776"
    pullPolicy: IfNotPresent

  api:
    http:
      targetPort: 8020
      nodePort: 30009
migrations:
  image:
    url: ncostamagna/ecommerce-back-migrations
    version: "eb9e29932dad7b9d756d6724e69a076a8dc3e776"

secrets:
  database:
    url:
      name: ecommerce-back-db
      key: url
  redis:
    addr:
      name: ecommerce-back-redis
      key: addr
    password:
      name: ecommerce-back-redis
      key: password
  s3:
    public_url:
      name: ecommerce-back-s3
      key: public_url
    access_key_id:
      name: ecommerce-back-s3
      key: access_key_id
    secret_access_key:
      name: ecommerce-back-s3
      key: secret_access_key
config:
  app:
    port: 8020
    env: development

  redis:
    db: 3

  jwt:
    secret: supersecretkey
    expiry_hours: 24

  resend:
    api_key: re_MAEg8pdk_8K9asa6NMhYH9ajkbxDj2cpU

  s3:
    bucket: lpt-ecommerce-prod
    region: us-east-1
    endpoint: ""


# DELETE ALL
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: passit-back.local
      paths:
        - path: /
          pathType: Prefix
  tls: []