replicaCount: 1
version: 1
name: passit-front
environment: development

deployment:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  image:
    url: ncostamagna/passit-front
    version: "5ec16f89ff6c4e0d1abe6eb2bc416476aa7d06f1"
    pullPolicy: IfNotPresent
  serviceType: ClusterIP

config:
  port: 3000
  baseUrl: "http://passit.127.0.0.1.nip.io"
  grpcHost: "passit-back.axul.svc.cluster.local:8050"

gateway:
  host: "passit.127.0.0.1.nip.io"