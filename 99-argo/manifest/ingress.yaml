apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: argocd-gateway
  namespace: argocd
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: TLS
    tls:
      mode: PASSTHROUGH
    hosts:
    - argocd.127.0.0.1.nip.io
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: argocd
  namespace: argocd
spec:
  hosts:
  - argocd.127.0.0.1.nip.io
  gateways:
  - argocd-gateway
  tls:
  - match:
    - port: 443
      sniHosts:
      - argocd.127.0.0.1.nip.io
    route:
    - destination:
        host: argocd-server
        port:
          number: 443
